<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Power Line — Ganita Prakash Grade 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#d8d4cc;
  --text:#1a1814;--text2:#5a5650;--text3:#9a958e;
  --blue:#2c5f9e;--red:#c0392b;--green:#1a7a4a;--orange:#e08020;
  --font:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',ui-monospace,monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;padding:24px 16px 60px;line-height:1.5}
.app{max-width:920px;margin:0 auto}

.head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.head-ic{width:42px;height:42px;border-radius:10px;background:var(--surface2);
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:600;color:var(--text2);font-size:16px;flex-shrink:0}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:2px}
.title{font-size:22px;font-weight:700;line-height:1.2}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}

/* ══ BASE SELECTOR ════════════════════════════════════════ */
.base-strip{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
.base-lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-right:4px}
.base-btn{width:40px;height:40px;border:1.5px solid var(--border);border-radius:9px;
  font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text2);
  background:var(--surface);cursor:pointer;transition:all .15s;display:flex;
  align-items:center;justify-content:center}
.base-btn:hover{border-color:var(--text3);color:var(--text)}
.base-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.custom-base-wrap{display:flex;gap:6px;align-items:center}
.custom-input{width:56px;height:40px;border:1.5px solid var(--border);border-radius:9px;
  font-family:var(--mono);font-size:16px;font-weight:700;text-align:center;
  background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.custom-input:focus{border-color:var(--blue)}
.set-btn{padding:0 14px;height:40px;border:1.5px solid var(--border);border-radius:9px;
  font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);
  background:var(--surface);cursor:pointer;transition:all .12s}
.set-btn:hover{border-color:var(--text3);color:var(--text)}

/* ══ CANVAS POWER LINE ════════════════════════════════════ */
.canvas-wrap{position:relative;margin-bottom:16px;border-radius:10px;overflow:hidden;
  background:var(--surface2);border:1.5px solid var(--border)}
#pl-canvas{display:block;width:100%;cursor:pointer}
.canvas-hint{position:absolute;bottom:8px;right:12px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text3);pointer-events:none}

/* ══ SELECTED INFO ════════════════════════════════════════ */
.sel-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:560px){.sel-layout{grid-template-columns:1fr}}

.sel-main-card{background:var(--surface2);border:1.5px solid var(--orange);border-radius:11px;padding:16px 18px}
.smc-exp{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--orange);margin-bottom:6px}
.smc-eq{font-family:var(--mono);font-size:24px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:4px}
.smc-sub{font-size:12px;color:var(--text2)}

.jump-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;padding:14px 16px}
.jc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.jump-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.jbtn{padding:8px 10px;border-radius:8px;border:1.5px solid;font-family:var(--mono);
  font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;line-height:1.3}
.jbtn.mult{background:#1a7a4a0d;border-color:#1a7a4a66;color:var(--green)}
.jbtn.mult:hover{background:#1a7a4a18;border-color:var(--green)}
.jbtn.div{background:#c0392b0d;border-color:#c0392b66;color:var(--red)}
.jbtn.div:hover{background:#c0392b18;border-color:var(--red)}
.jbtn:disabled{opacity:.3;cursor:default}

/* ══ RULES PANEL ════════════════════════════════════════ */
.rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(max-width:560px){.rules-grid{grid-template-columns:1fr}}
.rule-card{padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px}
.rc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:5px}
.rc-rule{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.rc-example{font-family:var(--mono);font-size:11px;color:var(--blue)}

/* ══ TEXTBOOK Q&A ════════════════════════════════════════ */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){.qa-grid{grid-template-columns:1fr}}
.qa-card{padding:11px 13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s}
.qa-card:hover{border-color:var(--blue)}
.qa-card.revealed{background:#f0f7f3;border-color:#b5d9c5}
.qa-q{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.qa-a{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);display:none}
.qa-card.revealed .qa-a{display:block}
.qa-hint{font-size:10px;color:var(--text3);margin-top:4px}
.qa-card.revealed .qa-hint{display:none}

.insight{background:#fff8f0;border:1px solid #f0d8c0;border-left:3px solid var(--orange);
  border-radius:0 8px 8px 0;padding:11px 14px;font-size:13px;color:#6b4400;line-height:1.65;margin-top:14px}
.insight strong{color:#4a2e00}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div class="head-ic">2</div>
    <div>
      <div class="lbl">Chapter 2 · Power Play</div>
      <div class="title">Power Line</div>
    </div>
  </div>

  <div class="card">
    <!-- Base selector -->
    <div class="base-strip">
      <span class="base-lbl">Base</span>
      <button class="base-btn active" data-base="2">2</button>
      <button class="base-btn" data-base="3">3</button>
      <button class="base-btn" data-base="5">5</button>
      <button class="base-btn" data-base="7">7</button>
      <button class="base-btn" data-base="10">10</button>
      <div class="custom-base-wrap">
        <input type="number" class="custom-input" id="custom-base" min="2" max="20" value="2" placeholder="n">
        <button class="set-btn" id="set-base-btn">Set</button>
      </div>
    </div>

    <!-- Canvas number line -->
    <div class="canvas-wrap">
      <canvas id="pl-canvas" height="200"></canvas>
      <div class="canvas-hint">Click any power to select it</div>
    </div>

    <!-- Selected cell + jumps -->
    <div class="sel-layout">
      <div class="sel-main-card">
        <div class="smc-exp" id="smc-exp">Selected: 2⁰</div>
        <div class="smc-eq" id="smc-eq">2⁰ = 1</div>
        <div class="smc-sub" id="smc-sub">Any base to the power 0 = 1</div>
      </div>
      <div class="jump-card">
        <div class="jc-title">Jump along the line</div>
        <div class="jump-btns" id="jump-btns"></div>
      </div>
    </div>

    <!-- Laws of exponents -->
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:9px">Laws of exponents — try them on the line</div>
    <div class="rules-grid" id="rules-grid"></div>

    <!-- Textbook Q&A -->
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:14px;margin-bottom:9px">
      Textbook questions — tap to reveal answers
    </div>
    <div class="qa-grid" id="qa-grid"></div>

    <div class="insight" id="insight"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let base = 2;
let selExp = 0;
const MIN_EXP = -4;
const MAX_EXP = 8;
const PR = window.devicePixelRatio || 1;

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function sup(n){
  return String(n).split('').map(c => ({
    '-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴',
    '5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'
  })[c] || c).join('');
}

function fmtVal(e){
  const v = Math.pow(base, e);
  if(e >= 0){
    if(v >= 1e9) return v.toExponential(1);
    return v.toLocaleString('en-IN');
  } else {
    // fraction
    const den = Math.round(Math.pow(base, -e));
    return `1/${den}`;
  }
}

function fmtValFull(e){
  const v = Math.pow(base, e);
  if(e >= 0) return v.toLocaleString('en-IN');
  const den = Math.round(Math.pow(base, -e));
  return `1/${den.toLocaleString('en-IN')}`;
}

// ═══════════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('pl-canvas');
const ctx = canvas.getContext('2d');

// Hit areas for click detection
let hitAreas = []; // [{exp, x, y, w, h}]

// Block layout: each exponent occupies a column.
// Column width is proportional to exponent DIFFERENCE on a log scale — 
// but since they're uniformly spaced on the exponent axis, use equal widths.
// The VISUAL WEIGHT (block height) varies: positive exponents = tall bar above,
// negative exponents = short bar below. Height is proportional to |e| + 1.

function getBlockHeight(e, maxH){
  // Height proportional to |e| + 1, capped
  const mag = Math.abs(e) + 1;
  return Math.min(maxH * 0.85, mag * 16);
}

function draw(){
  const W = canvas.clientWidth;
  const H = 200;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * PR;
  canvas.height = H * PR;
  ctx.resetTransform();
  ctx.scale(PR, PR);

  // Background
  ctx.fillStyle = '#f0ede8';
  ctx.fillRect(0, 0, W, H);

  const N = MAX_EXP - MIN_EXP + 1;
  const cellW = W / N;
  const AXIS_Y = H * 0.62; // horizontal axis line y

  hitAreas = [];

  // Draw axis
  ctx.strokeStyle = '#c8c0b8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, AXIS_Y);
  ctx.lineTo(W, AXIS_Y);
  ctx.stroke();

  for(let e = MIN_EXP; e <= MAX_EXP; e++){
    const idx = e - MIN_EXP;
    const cx = cellW * idx + cellW/2;
    const isSel = e === selExp;
    const isPos = e > 0;
    const isNeg = e < 0;
    const isZero = e === 0;

    // Column background hover area
    const colX = cellW * idx;
    hitAreas.push({exp: e, x: colX, y: 0, w: cellW, h: H});

    // Highlight selected column
    if(isSel){
      ctx.fillStyle = 'rgba(224,128,32,0.10)';
      ctx.fillRect(colX, 0, cellW, H);
    }

    // Block bar
    const BLOCK_W = Math.min(cellW - 10, 48);
    const blockX = cx - BLOCK_W/2;

    if(!isZero){
      const barH = getBlockHeight(e, AXIS_Y - 20);
      let barY, barColor;

      if(isPos){
        barY = AXIS_Y - barH;
        // Colour: deeper blue as exponent grows
        const t = (e - 1) / (MAX_EXP - 1);
        const r = Math.round(44 + t * (10 - 44));
        const g = Math.round(95 + t * (40 - 95));
        const b = Math.round(158 + t * (80 - 158));
        barColor = `rgb(${r},${g},${b})`;
      } else {
        barH; // same magnitude reference
        const negH = getBlockHeight(e, H - AXIS_Y - 30);
        barY = AXIS_Y;
        const t = (-e - 1) / (-MIN_EXP - 1);
        const r = Math.round(192 + t * (220 - 192));
        const gg = Math.round(57 + t * (100 - 57));
        const b2 = Math.round(43 + t * (60 - 43));
        barColor = `rgb(${r},${gg},${b2})`;

        // Draw downward bar
        const bH2 = getBlockHeight(e, H - AXIS_Y - 30);
        if(isSel){
          ctx.fillStyle = '#e08020';
        } else {
          ctx.fillStyle = barColor;
        }
        roundRect(cx - BLOCK_W/2, barY + 1, BLOCK_W, bH2, 4);
        ctx.fill();
        if(isSel){
          ctx.strokeStyle = '#b06000';
          ctx.lineWidth = 2;
          roundRect(cx - BLOCK_W/2, barY + 1, BLOCK_W, bH2, 4);
          ctx.stroke();
        }
      }

      if(isPos){
        if(isSel){
          ctx.fillStyle = '#e08020';
        } else {
          ctx.fillStyle = barColor;
        }
        roundRect(blockX, barY, BLOCK_W, barH, 4);
        ctx.fill();
        if(isSel){
          ctx.strokeStyle = '#b06000';
          ctx.lineWidth = 2;
          roundRect(blockX, barY, BLOCK_W, barH, 4);
          ctx.stroke();
        }
      }
    } else {
      // Zero: a dot on the axis
      ctx.beginPath();
      ctx.arc(cx, AXIS_Y, isSel ? 8 : 6, 0, Math.PI*2);
      ctx.fillStyle = isSel ? '#e08020' : '#b8b0a8';
      ctx.fill();
    }

    // Vertical tick on axis
    ctx.strokeStyle = '#b0a898';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, AXIS_Y - 5);
    ctx.lineTo(cx, AXIS_Y + 5);
    ctx.stroke();

    // Exponent label ABOVE axis (for positive) or below for negative
    ctx.font = `bold ${isSel ? 13 : 11}px DM Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = isSel ? '#e08020' : '#6a6058';

    const expLabel = `${base}${sup(e)}`;
    ctx.fillText(expLabel, cx, AXIS_Y - (isPos ? getBlockHeight(e, AXIS_Y-20) + 16 : 18));

    // Value label — below axis
    const valStr = fmtVal(e);
    ctx.font = `${isSel ? 'bold ' : ''}${isSel ? 12 : 10}px DM Mono, monospace`;
    ctx.fillStyle = isSel ? '#e08020' : '#9a958e';

    // For negative exponents, value goes below their downward bar
    const negBarH2 = isNeg ? getBlockHeight(e, H - AXIS_Y - 30) : 0;
    const valY = isNeg ? AXIS_Y + negBarH2 + 14 : AXIS_Y + 14;
    ctx.fillText(valStr, cx, Math.min(valY, H - 8));

    // ×base arrows between cells
    if(e < MAX_EXP){
      const ax = colX + cellW;
      ctx.font = '9px DM Sans';
      ctx.fillStyle = '#a0a898';
      ctx.textAlign = 'center';
      ctx.fillText(`×${base}`, ax, AXIS_Y - 10);
      ctx.fillText(`÷${base}`, ax, AXIS_Y + 18);
    }
  }
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════
// CANVAS CLICK
// ═══════════════════════════════════════════════════════
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  for(const hit of hitAreas){
    if(mx >= hit.x && mx < hit.x+hit.w && my >= hit.y && my < hit.y+hit.h){
      animateJump(selExp, hit.exp);
      selExp = hit.exp;
      updatePanel();
      return;
    }
  }
});

// ═══════════════════════════════════════════════════════
// JUMP ANIMATION
// ═══════════════════════════════════════════════════════
function animateJump(from, to){
  if(from === to) return;
  let t = 0;
  const W = canvas.clientWidth;
  const N = MAX_EXP - MIN_EXP + 1;
  const cellW = W / N;

  function step(){
    t++;
    draw();
    // Draw animated arrow
    const fromX = (from - MIN_EXP) * cellW + cellW/2;
    const toX   = (to   - MIN_EXP) * cellW + cellW/2;
    const y = 200 * 0.62;
    const progress = Math.min(1, t / 12);
    const curX = fromX + (toX - fromX) * progress;

    ctx.strokeStyle = '#e08020';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(fromX, y - 8);
    ctx.lineTo(curX, y - 8);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    if(progress > 0.5){
      const dir = to > from ? 1 : -1;
      ctx.fillStyle = '#e08020';
      ctx.beginPath();
      ctx.moveTo(curX, y - 8);
      ctx.lineTo(curX - dir*10, y - 14);
      ctx.lineTo(curX - dir*10, y - 2);
      ctx.closePath();
      ctx.fill();
    }

    if(t < 14) requestAnimationFrame(step);
    else draw();
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════
// PANEL UPDATE
// ═══════════════════════════════════════════════════════
function updatePanel(){
  draw();

  // Main card
  document.getElementById('smc-exp').textContent = `Selected: ${base}${sup(selExp)}`;
  document.getElementById('smc-eq').textContent = `${base}${sup(selExp)} = ${fmtValFull(selExp)}`;

  let sub = '';
  if(selExp === 0) sub = `Any base to the power 0 is always 1`;
  else if(selExp === 1) sub = `${base}¹ = ${base} (the base itself)`;
  else if(selExp > 0) sub = `${base} multiplied by itself ${selExp} time${selExp!==1?'s':''}`;
  else sub = `1 divided by ${base}${sup(-selExp)} = 1/${Math.round(Math.pow(base,-selExp))}`;
  document.getElementById('smc-sub').textContent = sub;

  // Jump buttons
  const jumps = document.getElementById('jump-btns');
  jumps.innerHTML = '';
  const steps = [1, 2, -1, -2];
  steps.forEach(step => {
    const target = selExp + step;
    const btn = document.createElement('button');
    const isUp = step > 0;
    btn.className = `jbtn ${isUp ? 'mult' : 'div'}`;
    btn.disabled = target < MIN_EXP || target > MAX_EXP;

    const op = isUp ? `× ${Math.pow(base,Math.abs(step)).toLocaleString('en-IN')}` : `÷ ${Math.pow(base,Math.abs(step)).toLocaleString('en-IN')}`;
    const reach = target >= 0 ? `= ${base}${sup(target)}` : `= ${base}${sup(target)}`;
    btn.innerHTML = `${op}<br>${reach} = ${fmtValFull(target)}`;
    if(!btn.disabled){
      btn.addEventListener('click', () => {
        animateJump(selExp, target);
        selExp = target;
        updatePanel();
      });
    }
    jumps.appendChild(btn);
  });

  // Laws
  const rules = [
    {
      label: 'Multiplying powers (same base)',
      rule: `${base}ᵃ × ${base}ᵇ = ${base}ᵃ⁺ᵇ`,
      example: `${base}${sup(selExp)} × ${base}${sup(2)} = ${base}${sup(selExp+2)} = ${selExp+2 <= MAX_EXP ? fmtValFull(selExp+2) : '(off chart)'}`,
    },
    {
      label: 'Dividing powers (same base)',
      rule: `${base}ᵃ ÷ ${base}ᵇ = ${base}ᵃ⁻ᵇ`,
      example: `${base}${sup(selExp)} ÷ ${base}${sup(2)} = ${base}${sup(selExp-2)} = ${selExp-2 >= MIN_EXP ? fmtValFull(selExp-2) : '(off chart)'}`,
    },
    {
      label: 'Power of a power',
      rule: `(${base}ᵃ)ᵇ = ${base}ᵃˣᵇ`,
      example: `(${base}${sup(selExp)})² = ${base}${sup(selExp*2)} = ${selExp*2 <= MAX_EXP ? fmtValFull(selExp*2) : '(off chart)'}`,
    },
    {
      label: 'Zero exponent',
      rule: `${base}⁰ = 1`,
      example: `Every base: 2⁰ = 3⁰ = 7⁰ = 1`,
    },
  ];
  const rgrid = document.getElementById('rules-grid');
  rgrid.innerHTML = '';
  rules.forEach(r => {
    const card = document.createElement('div');
    card.className = 'rule-card';
    card.innerHTML = `
      <div class="rc-label">${r.label}</div>
      <div class="rc-rule">${r.rule}</div>
      <div class="rc-example">${r.example}</div>
    `;
    rgrid.appendChild(card);
  });

  // Q&A
  buildQA();

  // Insight
  const prev = fmtValFull(selExp - 1);
  const next = fmtValFull(selExp + 1);
  document.getElementById('insight').innerHTML =
    `<strong>Reading the line:</strong> Each step right multiplies by ${base}. Each step left divides by ${base}.
    From ${base}${sup(selExp)} = ${fmtValFull(selExp)}: going left gives ${prev}, going right gives ${next <= MAX_EXP ? next : '(off chart)'}.
    Negative exponents are just fractions — they're as natural as positives, just on the other side.`;
}

function buildQA(){
  const b = base;
  const questions = [
    {
      q: `${b}${sup(3)} × ${b}${sup(4)} = ${b}${sup('?')}`,
      a: `${b}${sup(3)} × ${b}${sup(4)} = ${b}${sup(7)} = ${fmtValFull(7)}`,
      hint: 'Add the exponents'
    },
    {
      q: `${b}${sup(6)} ÷ ${b}${sup(2)} = ?`,
      a: `${b}${sup(6)} ÷ ${b}${sup(2)} = ${b}${sup(4)} = ${fmtValFull(4)}`,
      hint: 'Subtract the exponents'
    },
    {
      q: `(${b}${sup(2)})${sup(3)} = ?`,
      a: `${b}${sup(2)}${sup(3)} = ${b}${sup(6)} = ${fmtValFull(6)}`,
      hint: 'Multiply the exponents: 2 × 3 = 6'
    },
    {
      q: `${b}${sup(-2)} × ${b}${sup(5)} = ?`,
      a: `${b}${sup(-2)} × ${b}${sup(5)} = ${b}${sup(3)} = ${fmtValFull(3)}`,
      hint: '-2 + 5 = 3'
    },
    {
      q: `${b}${sup(0)} × ${b}${sup(4)} = ?`,
      a: `1 × ${b}${sup(4)} = ${b}${sup(4)} = ${fmtValFull(4)}`,
      hint: 'b⁰ = 1 always'
    },
    {
      q: `${fmtValFull(3)} ÷ ${fmtValFull(5)} = ?`,
      a: `${b}${sup(3)} ÷ ${b}${sup(5)} = ${b}${sup(-2)} = 1/${Math.round(b*b)}`,
      hint: '3 - 5 = -2'
    },
  ];

  const grid = document.getElementById('qa-grid');
  grid.innerHTML = '';
  questions.forEach(({q,a,hint}) => {
    const card = document.createElement('div');
    card.className = 'qa-card';
    card.innerHTML = `
      <div class="qa-q">${q}</div>
      <div class="qa-a">${a}</div>
      <div class="qa-hint">Tap to reveal — ${hint}</div>
    `;
    card.addEventListener('click', () => card.classList.toggle('revealed'));
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.base-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.base-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    base = +btn.dataset.base;
    document.getElementById('custom-base').value = base;
    selExp = 0;
    updatePanel();
  });
});

document.getElementById('set-base-btn').addEventListener('click', () => {
  const v = parseInt(document.getElementById('custom-base').value);
  if(v >= 2 && v <= 20){
    document.querySelectorAll('.base-btn').forEach(b => b.classList.remove('active'));
    base = v;
    selExp = 0;
    updatePanel();
  }
});

document.getElementById('custom-base').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('set-base-btn').click();
});

new ResizeObserver(() => { draw(); }).observe(canvas.parentElement);

// Init
updatePanel();
</script>
</body>
</html>
